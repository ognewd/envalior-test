<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envalior Test</title>
  <script type="text/javascript">
    var gigya;
    (function () {
      var cdcApiKey = "4_uaGvi2v3t0MdVlT0Z8gzug";

      var script = document.createElement("script");
      script.src =
        "https://cdns.gigya.com/js/gigya.js?apikey=" + cdcApiKey;
      script.async = true;

      script.onload = function () {
        gigya = window.gigya;
        initScreenSet();
      };

      document.head.appendChild(script);

      function initScreenSet() {
        gigya.accounts.showScreenSet({
          screenSet: "Default-RegistrationLogin",
          startScreen: "gigya-login-screen",
          containerID: "cdc-container",
          onAfterSubmit: function (event) {
            if (event.response && event.response.errorCode === 0) {
              gigya.accounts.showScreenSet({
                screenSet: "Default-ProfileUpdate",
                startScreen: "gigya-update-profile-screen",
                containerID: "cdc-container",
              });
            }
          },
        });
      }
    })();
  </script>

  <script>
    var API_KEY  = "4_uaGvi2v3t0MdVlT0Z8gzug";
    var USER_KEY = "AGfMj9yMhT6C";
    var SECRET   = "RFclk507DfVyiP9Ex2ILNcMWZ3WxEmRB";

    var BASE_URL = "https://accounts.eu1.gigya.com";

    function apiLogin(email, password) {
      var responseEl = document.getElementById("api-response");
      responseEl.className = "api-response";
      responseEl.textContent = "Calling API...";

      var params = new URLSearchParams({
        apiKey:   API_KEY,
        userKey:  USER_KEY,
        secret:   SECRET,
        loginID:  email,
        password: password,
        format:   "json"
      });

      fetch(BASE_URL + "/accounts.login", {
        method:  "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body:    params.toString()
      })
      .then(function (res) { return res.json(); })
      .then(function (data) { handleApiResponse(data); })
      .catch(function (err) {
        responseEl.className = "api-response error";
        responseEl.textContent = "Network error: " + err.message;
      });
    }

    function handleApiResponse(data) {
      var responseEl = document.getElementById("api-response");
      var status = data.errorCode === 0 ? "success" : "error";
      responseEl.className = "api-response " + status;
      responseEl.innerHTML =
        "<strong>" + (status === "success" ? "Login successful" : "Login failed") + "</strong>" +
        "<pre class='api-log'>" + JSON.stringify(data, null, 2) + "</pre>";
    }

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("api-login-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var email    = document.getElementById("api-email").value.trim();
        var password = document.getElementById("api-password").value;
        apiLogin(email, password);
      });
    });
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #003087;
      color: #ffffff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      gap: 40px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
    }

    #cdc-container {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      min-height: 200px;
    }

    /* API login card */
    #api-login-card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    #api-login-card h2 {
      font-size: 18px;
      color: #003087;
      margin-bottom: 20px;
    }

    #api-login-form .field {
      margin-bottom: 16px;
    }

    #api-login-form label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    #api-login-form input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #api-login-form input:focus {
      border-color: #003087;
    }

    #api-login-form button {
      width: 100%;
      padding: 11px;
      background-color: #003087;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 4px;
    }

    #api-login-form button:hover {
      background-color: #00216b;
    }

    .api-response {
      margin-top: 20px;
      padding: 14px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    .api-response:not(:empty) {
      display: block;
    }

    .api-response.success {
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      color: #2e7d32;
    }

    .api-response.error {
      background: #fdecea;
      border: 1px solid #f5c6c6;
      color: #c62828;
    }

    .nav-card {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      border-left: 4px solid #003087;
      transition: background 0.15s;
    }

    .nav-link:hover {
      background: #f0f4ff;
    }

    .nav-link-title {
      font-size: 15px;
      font-weight: 600;
      color: #003087;
    }

    .nav-link-sub {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
    }

    .api-log {
      margin-top: 10px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      background: rgba(0,0,0,0.04);
      padding: 10px;
      border-radius: 4px;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>Envalior Test</h1>
  </header>

  <main>

    <!-- Section 1: CDC ScreenSet (SDK) -->
    <div style="width:100%;max-width:480px;">
      <div class="section-label">ScreenSet Login (SDK)</div>
      <div id="cdc-container">
        <p style="color:#888;font-size:14px;">Loading...</p>
      </div>
    </div>

    <!-- Section 2: REST API Login (userKey / secret) -->
    <div style="width:100%;max-width:480px;">
      <div class="section-label">REST API Login (userKey / secret)</div>
      <div id="api-login-card">
        <h2>Sign in via API</h2>
        <form id="api-login-form" novalidate>
          <div class="field">
            <label for="api-email">Email</label>
            <input type="email" id="api-email" value="test@envalior.com" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="api-password">Password</label>
            <input type="password" id="api-password" value="123123" autocomplete="current-password" required />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="api-response" class="api-response"></div>
      </div>
    </div>

    <!-- Section 3: Other screens -->
    <div style="width:100%;max-width:480px;">
      <div class="section-label">Other screens</div>
      <div class="nav-card">
        <a href="acc-cname.html" class="nav-link">
          <span class="nav-link-title">ACC CNAME Login</span>
          <span class="nav-link-sub">acc-id.envalior.com &rarr; Default-RegistrationLogin</span>
        </a>
      </div>
    </div>

  </main>

  <footer>
    &copy; 2026 Envalior. All rights reserved.
  </footer>

</body>
</html>
