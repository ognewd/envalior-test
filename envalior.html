<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envalior Test</title>
  <script type="text/javascript">
    var gigya;
    (function () {
      var cdcApiKey = "4_Iu7vv1upR5yUfxWRjdFBFg";

      var script = document.createElement("script");
      script.src =
        "https://cdns.gigya.com/js/gigya.js?apikey=" + cdcApiKey;
      script.async = true;

      script.onload = function () {
        gigya = window.gigya;
        initScreenSet();
      };

      document.head.appendChild(script);

      function initScreenSet() {
        gigya.accounts.showScreenSet({
          screenSet: "Default-RegistrationLogin",
          startScreen: "gigya-login-screen",
          containerID: "cdc-container",
          onAfterSubmit: function (event) {
            if (event.response && event.response.errorCode === 0) {
              gigya.accounts.showScreenSet({
                screenSet: "Default-ProfileUpdate",
                startScreen: "gigya-update-profile-screen",
                containerID: "cdc-container",
              });
            }
          },
        });
      }
    })();
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      background-color: #003087;
      color: #ffffff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    #cdc-container {
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      min-height: 200px;
    }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>Envalior Test</h1>
  </header>

  <main>
    <div id="cdc-container">
      <p style="color:#888;font-size:14px;">Loading...</p>
    </div>
  </main>

  <footer>
    &copy; 2026 Envalior. All rights reserved.
  </footer>

</body>
</html>
